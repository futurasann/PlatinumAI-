<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlatinumAI - Groq Live</title>
    <style>
        :root {
            --bg-dark: #000000;
            --card-dark: #1c1c1e;
            --text-secondary: #8e8e93;
            --gradient-text: linear-gradient(to right, #9d7aff, #ef81b1);
            --user-bubble: #2c2c2e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: white;
            height: 100vh;
            display: flex;
            justify-content: center;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 10px 10px 25px 10px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #000;
            border-radius: 40px;
            border: 1px solid #333;
            margin-bottom: 5px;
        }

        .logo-text { 
            font-weight: 700; font-size: 18px; 
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .profile-img { 
            width: 32px; height: 32px; border-radius: 50%; 
            border: 1px solid #444; object-fit: cover;
        }

        #chat-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scrollbar-width: none;
        }

        .welcome-screen {
            flex: 1; display: flex; justify-content: center; align-items: center; text-align: center;
        }

        .welcome-text {
            font-size: 32px; font-weight: 700;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
        }

        .message { max-width: 85%; line-height: 1.5; font-size: 15px; word-wrap: break-word; }
        .user-msg {
            align-self: flex-end;
            background-color: var(--user-bubble);
            padding: 10px 16px;
            border-radius: 18px 18px 2px 18px;
        }
        .ai-msg { align-self: flex-start; color: #ffffff; }
        .ai-label {
            font-weight: bold;
            background: var(--gradient-text);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: block;
            margin-bottom: 4px;
        }

        #loading-ui {
            display: none; padding-left: 15px; margin-bottom: 15px; align-self: flex-start;
        }
        .loading-container {
            display: flex; align-items: center; gap: 5px;
            background: #1c1c1e; padding: 10px 18px; border-radius: 20px;
        }
        .dot {
            width: 6px; height: 6px; background-color: var(--text-secondary);
            border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both;
        }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); opacity: 0.3; } 40% { transform: scale(1); opacity: 1; } }

        .bottom-panel {
            background-color: var(--card-dark); border-radius: 35px;
            padding: 20px; margin-bottom: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        .input-box {
            width: 100%; background: transparent; border: none;
            color: white; font-size: 16px; outline: none; margin-bottom: 15px;
        }
        .controls-row { display: flex; justify-content: space-between; align-items: center; }
        .send-btn {
            background-color: white; width: 45px; height: 45px;
            border-radius: 50%; display: flex; justify-content: center;
            align-items: center; cursor: pointer; transition: 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <div style="cursor:pointer">☰</div>
            <div class="logo-text">PlatinumAI</div>
            <a href="https://ibb.co.com/RpkJ7NHx" target="_blank">
                <img src="https://i.ibb.co.com/XfR0LzXN/94755.jpg" class="profile-img">
            </a>
        </header>

        <div id="chat-content">
            <div class="welcome-screen" id="welcome-msg">
                <h1 class="welcome-text">Hello, Tesan<br>Can I help you Today?</h1>
            </div>
        </div>

        <div id="loading-ui">
            <div class="loading-container"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
        </div>

        <div class="bottom-panel">
            <input type="text" id="user-input" class="input-box" placeholder="Ask PlatinumAI..." autocomplete="off">
            <div class="controls-row">
                <div style="color:var(--text-secondary); font-size:22px;">+</div>
                <div class="send-btn" id="send-trigger">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="black"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- KONFIGURASI GROQ CLOUD ---
        const API_KEY = "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"; 
        const BASE_URL = "https://api.groq.com/openai/v1/chat/completions";
        const MODEL_NAME = "llama-3.3-70b-versatile"; 

        const input = document.getElementById('user-input');
        const chat = document.getElementById('chat-content');
        const welcome = document.getElementById('welcome-msg');
        const loader = document.getElementById('loading-ui');
        const btn = document.getElementById('send-trigger');

        async function fetchAIResponse(userText) {
            try {
                const response = await fetch(BASE_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${API_KEY}`
                    },
                    body: JSON.stringify({
                        model: MODEL_NAME,
                        messages: [{ role: "user", content: userText }]
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    const aiText = data.choices[0].message.content;
                    // Format markdown simpel ke HTML
                    const formattedText = aiText
                        .replace(/\n/g, '<br>')
                        .replace(/\*\*(.*?)\*\*/g, '<b>$1</b>')
                        .replace(/\*(.*?)\*/g, '<i>$1</i>');
                    
                    const bubble = createBubble('ai', "");
                    typeWriter(bubble.querySelector('.typing-target'), formattedText);
                } else {
                    const errorDetail = data.error ? data.error.message : "Unknown Error";
                    const bubble = createBubble('ai', "");
                    typeWriter(bubble.querySelector('.typing-target'), `<b>Groq Error:</b> ${errorDetail}`);
                }
            } catch (error) {
                const bubble = createBubble('ai', "");
                typeWriter(bubble.querySelector('.typing-target'), "<b>System Error:</b> " + error.message);
            } finally {
                loader.style.display = 'none';
            }
        }

        function pushMessage() {
            const val = input.value.trim();
            if (!val) return;
            if (welcome) welcome.style.display = 'none';
            createBubble('user', val);
            input.value = "";
            loader.style.display = 'block';
            chat.scrollTop = chat.scrollHeight;
            fetchAIResponse(val);
        }

        function createBubble(sender, content) {
            const div = document.createElement('div');
            div.className = sender === 'user' ? 'message user-msg' : 'message ai-msg';
            div.innerHTML = sender === 'ai' ? `<span class="ai-label">PlatinumAI</span><span class="typing-target"></span>` : content;
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function typeWriter(element, html) {
            let i = 0;
            const timer = setInterval(() => {
                if (i < html.length) {
                    if (html[i] === '<') {
                        let tagEnd = html.indexOf('>', i);
                        element.innerHTML += html.substring(i, tagEnd + 1);
                        i = tagEnd + 1;
                    } else {
                        element.innerHTML += html[i];
                        i++;
                    }
                    chat.scrollTop = chat.scrollHeight;
                } else {
                    clearInterval(timer);
                }
            }, 8); 
        }

        btn.addEventListener('click', pushMessage);
        input.addEventListener('keypress', (e) => { if (e.key === 'Enter') pushMessage(); });
    </script>
</body>
</html>
